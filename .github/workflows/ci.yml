name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t emass-mock:ci .
      - name: Smoke test container
        run: |
          docker run -d --name mock -p 8080:8080 emass-mock:ci
          for i in {1..10}; do
            if curl -sf http://localhost:8080/health; then exit 0; fi
            sleep 1
          done
          docker logs mock
          exit 1
